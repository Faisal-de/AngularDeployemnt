<div class="flex h-screen flex-col bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-green-500 selection:text-black">
  <div class="flex flex-1 overflow-hidden p-2 gap-2">
    
    <aside class="w-64 bg-zinc-900 rounded-lg flex flex-col p-4 border border-zinc-800/50">
      <div class="flex items-center gap-2 px-2 mb-6">
        <span class="text-green-500 font-black text-2xl tracking-tighter">VIBESTREAM</span>
      </div>
      <nav class="space-y-1">
        <a routerLink="/explorer" routerLinkActive="bg-zinc-800 text-zinc-100 border-zinc-700/50" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-4 px-3 py-2.5 rounded-md font-medium text-sm text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 border border-transparent transition">
          <span>🏠</span> Home Explorer
        </a>
        <a routerLink="/insights" routerLinkActive="bg-zinc-800 text-zinc-100 border-zinc-700/50" class="flex items-center gap-4 px-3 py-2.5 rounded-md font-medium text-sm text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 border border-transparent transition">
          <span>📊</span> Listening Insights
        </a>
      </nav>
    </aside>

    <main class="flex-1 bg-zinc-900 rounded-lg overflow-y-auto p-6 border border-zinc-800/50">
      <router-outlet />
    </main>

  </div>

  <footer class="h-20 bg-zinc-950 border-t border-zinc-900 px-4 flex items-center justify-between z-10">
    
    <div class="flex items-center gap-3 w-1/4">
      <div class="w-12 h-12 bg-zinc-900 border border-zinc-800 rounded flex items-center justify-center text-xl select-none">
        {{ activeTrack() ? activeTrack()?.coverIcon : '🎵' }}
      </div>
      <div class="overflow-hidden">
        <h4 class="text-sm font-medium truncate text-zinc-100">
          {{ activeTrack() ? activeTrack()?.title : 'No Track Selected' }}
        </h4>
        <p class="text-xs text-zinc-400 truncate font-mono mt-0.5">
          {{ activeTrack() ? activeTrack()?.artist : 'Choose a track to stream' }}
        </p>
      </div>
    </div>

    <div class="flex flex-col items-center gap-1.5 max-w-xl w-2/5">
      <div class="flex items-center gap-5 text-zinc-400">
        <button (click)="handleSkip(-5)" class="hover:text-white transition text-lg" title="Skip back 5s">⏪</button>
        
        <button (click)="handlePlaybackToggle()" class="w-8 h-8 rounded-full bg-white text-black flex items-center justify-center font-bold hover:scale-105 transition">
          {{ isPlaying() ? '⏸' : '▶' }}
        </button>
        
        <button (click)="handleSkip(5)" class="hover:text-white transition text-lg" title="Skip forward 5s">⏩</button>
      </div>
      
      <div class="w-full flex items-center gap-2 text-[10px] text-zinc-400 font-mono">
        <span>{{ currentTimeFormatted() }}</span>
        
        <input type="range" 
               class="flex-1 h-1 bg-zinc-800 accent-green-500 rounded-full appearance-none cursor-pointer outline-none"
               [value]="currentTime()" 
               [min]="0"
               [max]="duration() || 100" 
               (input)="handleSeek($event)" />
               
        <span>{{ durationFormatted() }}</span>
      </div>
    </div>

    <div class="w-1/4 flex justify-end items-center gap-2 text-zinc-400">
      <span class="text-xs">🔊</span>
      <div class="w-24 h-1 bg-zinc-800 rounded-full overflow-hidden">
        <div class="h-full w-2/3 bg-zinc-400"></div>
      </div>
    </div>

  </footer>
</div>
